<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Debate + Judge Pipeline</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; line-height: 1.6; background: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; resize: vertical; }
        button { padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        #results { margin-top: 30px; }
        .round { border-left: 4px solid #3498db; padding-left: 20px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 4px; }
        .agent-label { font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .response { white-space: pre-wrap; color: #555; }
        .judgment { border: 2px solid #27ae60; background: #e8f8f5; padding: 20px; border-radius: 8px; margin-top: 30px; }
        .jury { border: 2px solid #8e44ad; background: #f4ecf7; padding: 20px; border-radius: 8px; margin-top: 30px; }
        .verdict { font-size: 1.2em; font-weight: bold; color: #27ae60; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LLM Debate + Judge Pipeline</h1>
        <div class="input-group">
            <textarea id="question" rows="3" placeholder="Enter a challenging reasoning question..."></textarea>
            <div style="margin-bottom: 10px;">
                <label>
                    <input type="checkbox" id="useJury"> Use Multi-Agent Jury Panel (Bonus)
                </label>
            </div>
            <button id="runBtn">Launch Debate</button>
        </div>
        <div id="loading" class="loading">Debaters are arguing... This may take a minute.</div>
        <div id="results"></div>
    </div>

    <script>
        document.getElementById('runBtn').addEventListener('click', async () => {
            const question = document.getElementById('question').value;
            const useJury = document.getElementById('useJury').checked;
            if (!question) return;

            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            resultsDiv.innerHTML = '';
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/run_debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, include_jury: useJury })
                });
                const data = await response.json();
                
                let html = '<h2>Debate Transcript</h2>';
                data.transcript.forEach(item => {
                    html += `
                        <div class="round">
                            <div class="agent-label">${item.agent} (Round ${item.round})</div>
                            <div class="response">${item.response.text}</div>
                        </div>
                    `;
                });

                html += `
                    <div class="judgment">
                        <h2>Single Judge Verdict</h2>
                        <div class="response">${data.judgment.text}</div>
                    </div>
                `;

                if (data.jury_result) {
                    html += `
                        <div class="jury">
                            <h2>Jury Panel Verdict (Bonus)</h2>
                            <p><strong>Final Decision:</strong> ${data.jury_result.majority_vote}</p>
                            <p><strong>Votes:</strong> Yes: ${data.jury_result.votes.Yes}, No: ${data.jury_result.votes.No}</p>
                            <div class="response">${data.jury_result.final_verdicts.join('\n\n---\n\n')}</div>
                        </div>
                    `;
                }
                
                resultsDiv.innerHTML = html;
            } catch (err) {
                resultsDiv.innerHTML = `<div style="color:red">Error: ${err.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
